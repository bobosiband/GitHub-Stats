name: Scheduled sync

# External trigger for GitRank's sync + title-eval runner. Fires every 30
# minutes so the deployed service picks up new snapshots — and, on free tiers
# where the service sleeps when idle, the curl both wakes it up and triggers
# the work.
#
# NOTE: GitHub Actions cron is best-effort — during heavy load a run may fire
# several minutes late (or occasionally skip a slot). The in-process node-cron
# tick and this external trigger share the same lock inside the sync runner
# (`{ skipped: true, reason: 'in_progress' }`), so overlap is safe.

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  trigger:
    name: POST /admin/sync-all
    runs-on: ubuntu-latest
    steps:
      - name: Trigger sync-all
        env:
          APP_URL: ${{ secrets.APP_URL }}
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${APP_URL:-}" ] || [ -z "${ADMIN_TOKEN:-}" ]; then
            echo "APP_URL and ADMIN_TOKEN repo secrets must be set." >&2
            exit 1
          fi
          # `--fail-with-body` returns non-zero on 4xx/5xx while still showing the response body.
          curl --fail-with-body --silent --show-error \
            --max-time 300 \
            -X POST "${APP_URL%/}/admin/sync-all" \
            -H "Authorization: Bearer ${ADMIN_TOKEN}"
