# Build the Vite frontend and deploy it to GitHub Pages.
# The Vite app lives at Frontend/ in this monorepo — the workflow's shape
# matches the standard actions/upload-pages-artifact + actions/deploy-pages
# recipe, adjusted for the subdirectory.
#
# One-time repo setup:
#   1. Settings → Pages → Build and deployment: Source = "GitHub Actions".
#   2. Settings → Secrets and variables → Actions → Variables:
#        API_BASE = https://<your-backend-host>   (baked into VITE_API_BASE at build).
#   3. Backend CORS_ORIGIN must include https://<user>.github.io.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Frontend/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          VITE_API_BASE: ${{ vars.API_BASE }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: Frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
