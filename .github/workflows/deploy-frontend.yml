# Build the GitRank frontend on every push to main (when files in Frontend/ change)
# and deploy the dist/ output to GitHub Pages.
#
# One-time repo setup:
#   1. Settings → Pages → Build and deployment: source = "GitHub Actions".
#   2. Settings → Secrets and variables → Actions → Variables tab:
#        API_BASE = https://<your-backend-host>/    (used as VITE_API_BASE at build)
#   3. Make sure the backend's CORS_ORIGIN env var includes this site's origin
#      (e.g. https://<user>.github.io).
name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'Frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

# Only one deploy at a time; queue but don't cancel a run in progress —
# a half-deployed Pages is worse than one extra minute of wait.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        env:
          VITE_API_BASE: ${{ vars.API_BASE }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: Frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
